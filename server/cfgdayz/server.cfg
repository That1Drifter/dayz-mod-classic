// =============================================================================
// DayZ Mod Classic 1.0.0 - Public Server Config
// Public internet play: BattlEye + signature verification on.
// For LAN-only or testing, set BattlEye=0 + verifySignatures=0.
// =============================================================================

// GLOBAL SETTINGS
hostname        = "DayZ Mod Classic 1.0 [Official]";
password        = "";                                 // joining password (empty = open)
passwordAdmin   = "CHANGE_ME_BEFORE_LAUNCH";          // EDIT BEFORE LAUNCH (#login <pw> in-game)
reportingIP     = "";                                 // GameSpy dead; no master server
logFile         = "cfgdayz\server_console.log";


// WELCOME MESSAGE
motd[] = {
    "DayZ Mod Classic 1.0.0",
    "The original 2012 DayZ Mod, revived.",
    "dayzmodclassic.com",
    "Have fun. Don't be a bandit (unless you must)."
};
motdInterval = 5;


// JOINING RULES
maxPlayers          = 40;
kickDuplicate       = 1;
verifySignatures    = 2;        // Public: enforce signed PBOs against Keys/
equalModRequired    = 0;
requiredBuild       = 0;


// VOTING
voteMissionPlayers  = 99;
voteThreshold       = 1.5;


// INGAME SETTINGS
disableVoN          = 0;
vonCodecQuality     = 10;
persistent          = 1;        // mission keeps running with 0 players
timeStampFormat     = "short";
BattlEye            = 1;        // Public: BE on. Dwarden Win11 fix required on Win11 24H2.


// SCRIPTING ISSUES
onUserConnected     = "";
onUserDisconnected  = "";
doubleIdDetected    = "";
regularCheck        = "{}";


// SIGNATURE VERIFICATION
onUnsignedData      = "kick (_this select 0)";
onHackedData        = "kick (_this select 0)";
onDifferentData     = "";


// MISSIONS CYCLE
class Missions
{
    class DayZ {
        template    = dayz_1.Chernarus;
        difficulty  = "Regular";
    };
};
